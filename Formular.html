<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=devide-width, initial-scale=1.0">
        <link rel="stylesheet" href="FormStyle.css"> <!-- Länk till en extern stilmall -->
        <style>
            h1{text-align: center;}
            li{text-align: center;}
        </style>
    </head>
    <body>
        <header>
                <h1>Skriv en hälsning till polly och pysen!</h1>
        </header> 
        <main>
            <section>
                <form>
                    <label for="name">Namn</label>
                    <input type="text" id="name" name="name" placeholder="Skriv namn här">

                    <label for="phone">Telefon</label>
                    <input type="tel" id="phone" name="phone" placeholder="Skriv telefonummer här">

                    <label for="message">Medelande</label>
                    <textarea id="message" name="message" rows="4" placeholder="Skriv ett medelande eller en fråga till polly och pysen här!"></textarea>

                    <button type="submit">Skicka</button>
                </form>
            </section>
        </main>
        <footer>
            <nav>
                <ul>
                    <li><a href="index.html">Tillbaka</a></li>
                </ul>
            </nav>
        </footer>
    </body>
</html>
